<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nearby — Something interesting is closer than you think.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F9F6F0;
      color: #1A1814;
    }
    /* Playfair italic — the voice of the product */
    .font-serif-italic {
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    /* Playfair upright — wordmark & subheads */
    .font-playfair {
      font-family: 'Playfair Display', serif;
      font-style: normal;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F9F6F0; }
    ::-webkit-scrollbar-thumb { background: #DDD8CE; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #A09888; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
